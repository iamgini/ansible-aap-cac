---
# Execution Environment images for different AAP versions:
# AAP 2.4: registry.redhat.io/ansible-automation-platform-24/ee-supported-rhel8:latest
# AAP 2.5: registry.redhat.io/ansible-automation-platform-25/ee-supported-rhel9:latest
# AAP 2.6: registry.redhat.io/ansible-automation-platform-26/ee-supported-rhel9:latest
# Override with: ansible-navigator run playbook.yml --eei <custom-image>
ansible-navigator:
  execution-environment:
    container-engine: podman
    image: registry.redhat.io/ansible-automation-platform-24/ee-supported-rhel8:1.0.0-395
    enabled: true
    pull:
      policy: missing

  editor:
    command: code-server {filename}
    console: false

  logging:
  #   level: debug
    append: false

  mode: stdout

  playbook-artifact:
    enable: false
    replay: artifacts/ansible_artifact.json
    save-as: artifacts/ansible_artifact.json
