---
# EDA Rulebook Activation Configuration
eda_rulebook_activations:
  - name: Intelligent-Remediation
    description: "Routes events to AAP job templates: Cases 1-4 for known events, Case 5 for AI intelligence"
    rulebook_name: intelligent-remediation.yml  # Rulebook file name (not full path)
    project_name: AIOps-Rulebooks  # References eda_projects.yaml
    decision_environment_name: AIOps-Decision-Environment  # References eda_decision_environments.yaml
    awx_token_name: AAP-Controller-Token  # References eda_credentials.yaml
    enabled: true
    restart_policy: on-failure
    log_level: info
    # k8s_service_name: null  # For K8s deployments
    # webhooks_enabled: true  # Webhook is enabled by default for ansible.eda.webhook source
    # Extra vars for rulebook (if needed)
    # extra_var: |
    #   maya_api_url: "http://localhost:8000/api/v1/events/generate"

# Note: The rulebook activation requires:
# 1. EDA project (AIOps-Rulebooks) created with rulebook file
# 2. Decision environment (AIOps-Decision-Environment) with ansible-rulebook
# 3. AAP credential (AAP-Controller-Token) for launching job templates
# 4. Webhook port 5000 is default for ansible.eda.webhook source

# Dependencies (must be created first):
# - eda_credentials.yaml → AAP-Controller-Token
# - eda_decision_environments.yaml → AIOps-Decision-Environment
# - eda_projects.yaml → AIOps-Rulebooks
# - controller_templates.yaml → Job templates to launch
