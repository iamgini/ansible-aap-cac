---
# Custom Credential Types for AIOps
controller_credential_types:
  - name: AIOps Integration Credential
    description: Credentials for MCP server and Git integration
    kind: cloud
    inputs:
      fields:
        - id: mcp_server_url
          type: string
          label: AAP MCP Server URL
          help_text: "e.g., http://localhost:3000/mcp or leave empty if not using MCP"
        - id: aap_bearer_token
          type: string
          label: AAP Bearer Token
          secret: true
          help_text: "OAuth2 token for AAP MCP server access"
        - id: git_token
          type: string
          label: Git Personal Access Token
          secret: true
          help_text: "GitHub/GitLab token for pushing generated playbooks"
        - id: git_username
          type: string
          label: Git Username
          help_text: "Username for git commits"
        - id: git_email
          type: string
          label: Git Email
          help_text: "Email for git commits"
        - id: git_remote_url
          type: string
          label: Git Repository URL
          help_text: "Repository for storing generated playbooks (e.g., https://github.com/user/repo)"
      required:
        - git_username
        - git_email
    injectors:
      env:
        AAP_MCP_SERVER_URL: "{{'{{'}} mcp_server_url {{'}}'}}"
        AAP_BEARER_TOKEN: "{{'{{'}} aap_bearer_token {{'}}'}}"
        GIT_TOKEN: "{{'{{'}} git_token {{'}}'}}"
        GIT_USERNAME: "{{'{{'}} git_username {{'}}'}}"
        GIT_EMAIL: "{{'{{'}} git_email {{'}}'}}"
        GIT_REMOTE_URL: "{{'{{'}} git_remote_url {{'}}'}}"
