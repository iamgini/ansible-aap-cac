---
# EDA Credentials Configuration
# These are EDA-specific credentials (different from Controller credentials)

eda_credentials:
  # AAP Controller Token for launching job templates from EDA
  - name: AAP-Controller-Token
    description: OAuth2 token for EDA to launch AAP Controller job templates
    credential_type: Red Hat Ansible Automation Platform
    inputs:
      host: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://controller.example.com', true) }}"
      oauth_token: "{{ lookup('env', 'AAP_OAUTH_TOKEN') | default('REPLACE_WITH_YOUR_TOKEN', true) }}"
      verify_ssl: false
    # organization: Default  # EDA credentials may not support organization

  # Optional: Git credential if rulebook repository is private
  # - name: GitHub-Credential-EDA
  #   description: GitHub credential for private rulebook repository
  #   credential_type: GitHub Personal Access Token
  #   inputs:
  #     username: iamgini
  #     token: !vault |
  #       $ANSIBLE_VAULT;1.1;AES256
  #       # Your vaulted GitHub PAT

# Note: EDA credentials are separate from Controller credentials
# The AAP Controller Token is required for run_job_template actions in rulebooks

# To create OAuth token in AAP:
# 1. AAP UI → Settings → Users → [Your User]
# 2. Tokens → Add
# 3. Application: Leave blank (for personal token)
# 4. Scope: Write
# 5. Copy the generated token
# 6. Encrypt with: ansible-vault encrypt_string 'token_value' --name 'oauth_token'
