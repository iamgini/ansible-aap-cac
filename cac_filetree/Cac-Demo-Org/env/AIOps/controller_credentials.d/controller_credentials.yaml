---
controller_credentials:
  - credential_type: AIOps Integration Credential
    name: AIOps-Integration
    organization: Cac-Demo-Org
    description: MCP and Git integration credential for AI-powered remediation
    update_secrets: false
    inputs:
      mcp_server_url: "http://localhost:3000/mcp"
      git_username: automation
      git_email: automation@example.com
      git_remote_url: "https://github.com/iamgini/ansible-ai-generated-playbooks"

  - credential_type: Machine
    name: AIOps-Machine-Credential
    organization: Cac-Demo-Org
    description: Machine credential for AIOps remediation playbooks
    inputs:
      username: ansible
      become_method: sudo
      become_username: root
