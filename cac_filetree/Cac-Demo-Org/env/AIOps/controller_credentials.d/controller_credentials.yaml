---
controller_credentials:
  # Credential 1: AAP MCP (for template intelligence queries)
  - credential_type: AAP MCP
    name: AAP-MCP
    organization: AIOps
    description: AAP MCP Server credential for intelligent template matching
    update_secrets: false
    inputs:
      mcp_server_url: "https://aap.example.com:8448/job_management/mcp"

  # Credential 2: Generic AI API (for AI-powered playbook generation)
  - credential_type: Generic AI API
    name: Generic-AI-API
    organization: AIOps
    description: AI API credential for playbook generation (OpenAI, vLLM, Ollama, etc.)
    update_secrets: false
    inputs:
      generic_ai_api_url: "https://api.openai.com/v1/chat/completions"
      generic_ai_model: "gpt-4"

  # Credential 3: Git SCM (for pushing AI-generated playbooks)
  - credential_type: Git SCM
    name: Git-SCM
    organization: AIOps
    description: Git credential for pushing AI-generated playbooks to repository
    update_secrets: false
    inputs:
      git_username: automation
      git_email: automation@example.com

  # Machine credential for remediation playbooks
  - credential_type: Machine
    name: AIOps-Machine
    organization: AIOps
    description: Machine credential for AIOps remediation playbooks
    inputs:
      username: ansible
      become_method: sudo
      become_username: root
