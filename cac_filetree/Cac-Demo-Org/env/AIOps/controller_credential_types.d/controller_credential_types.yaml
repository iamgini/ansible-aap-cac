---
controller_credential_types:
  # Credential Type 1: AAP MCP
  - name: AAP MCP
    description: AAP MCP Server credential for template intelligence queries
    kind: cloud
    inputs:
      fields:
        - id: mcp_server_url
          type: string
          label: AAP MCP Server URL
          help_text: "e.g., https://aap.example.com:8448/job_management/mcp"
        - id: aap_bearer_token
          type: string
          label: AAP Bearer Token
          secret: true
    injectors:
      env:
        AAP_MCP_SERVER_URL: "{% raw %}{{ mcp_server_url }}{% endraw %}"
        AAP_BEARER_TOKEN: "{% raw %}{{ aap_bearer_token }}{% endraw %}"

  # Credential Type 2: Generic AI API
  - name: Generic AI API
    description: Generic AI API credential for OpenAI, Azure OpenAI, vLLM, Ollama, etc.
    kind: cloud
    inputs:
      fields:
        - id: generic_ai_api_token
          type: string
          label: AI API Token
          secret: true
          help_text: "Bearer token for the AI API (OpenAI, Azure OpenAI, vLLM, Ollama, etc.)"
        - id: generic_ai_api_url
          type: string
          label: AI API URL
          help_text: "OpenAI-compatible chat completions endpoint URL"
        - id: generic_ai_model
          type: string
          label: AI Model
          help_text: "Model name (e.g., gpt-4, gpt-4o, llama3, mistral)"
      required:
        - generic_ai_api_token
        - generic_ai_api_url
    injectors:
      env:
        GENERIC_AI_API_TOKEN: "{% raw %}{{ generic_ai_api_token }}{% endraw %}"
        GENERIC_AI_API_URL: "{% raw %}{{ generic_ai_api_url }}{% endraw %}"
        GENERIC_AI_MODEL: "{% raw %}{{ generic_ai_model }}{% endraw %}"

  # Credential Type 3: Git SCM
  - name: Git SCM
    description: Git credentials for pushing AI-generated playbooks to repositories
    kind: cloud
    inputs:
      fields:
        - id: git_username
          type: string
          label: Git Username
        - id: git_token
          type: string
          label: Git Token or Password
          help_text: "Personal access token (GitHub/GitLab/Bitbucket) or password"
          secret: true
        - id: git_email
          type: string
          label: Git Email
    injectors:
      env:
        GIT_TOKEN: "{% raw %}{{ git_token }}{% endraw %}"
        GIT_USERNAME: "{% raw %}{{ git_username }}{% endraw %}"
        GIT_EMAIL: "{% raw %}{{ git_email }}{% endraw %}"
