---
controller_credential_types:
  - name: AIOps Integration Credential
    description: Custom credential for AIOps MCP and Git integration
    kind: cloud
    inputs:
      fields:
        - id: mcp_server_url
          type: string
          label: MCP Server URL
          help_text: URL of the AAP MCP server endpoint
        - id: aap_bearer_token
          type: string
          label: AAP Bearer Token
          secret: true
          help_text: OAuth2 bearer token for AAP API access
        - id: git_token
          type: string
          label: Git Token
          secret: true
          help_text: Personal access token for Git operations
        - id: git_username
          type: string
          label: Git Username
        - id: git_email
          type: string
          label: Git Email
        - id: git_remote_url
          type: string
          label: Git Remote URL
          help_text: Remote Git repository URL for generated playbooks
      required:
        - git_username
        - git_email
    injectors:
      env:
        AAP_MCP_SERVER_URL: "{% raw %}{{ mcp_server_url }}{% endraw %}"
        AAP_BEARER_TOKEN: "{% raw %}{{ aap_bearer_token }}{% endraw %}"
        GIT_TOKEN: "{% raw %}{{ git_token }}{% endraw %}"
        GIT_USERNAME: "{% raw %}{{ git_username }}{% endraw %}"
        GIT_EMAIL: "{% raw %}{{ git_email }}{% endraw %}"
        GIT_REMOTE_URL: "{% raw %}{{ git_remote_url }}{% endraw %}"
