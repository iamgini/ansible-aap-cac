---
eda_credentials:
  - name: AAP-Controller-Token
    credential_type: "Red Hat Ansible Automation Platform"
    description: AAP Controller OAuth2 token for EDA rulebook actions
    update_secrets: false
    inputs:
      host: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://aap.example.com', true) }}"
      oauth_token: "{{ lookup('env', 'AAP_OAUTH_TOKEN') | default('YOURTOKEN', true) }}"
      verify_ssl: false
