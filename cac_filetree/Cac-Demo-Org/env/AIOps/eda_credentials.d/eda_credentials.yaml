---
eda_credentials:
  - name: AAP-Controller-Token
    credential_type: "Red Hat Ansible Automation Platform"
    description: AAP Controller credential for EDA rulebook actions
    organization: Cac-Demo-Org
    inputs:
      # EDA requires /api/controller suffix on the host URL
      host: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://aap.example.com', true) }}/api/controller"
      username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
      password: "{{ lookup('env', 'CONTROLLER_PASSWORD') | default('password', true) }}"
      verify_ssl: false
