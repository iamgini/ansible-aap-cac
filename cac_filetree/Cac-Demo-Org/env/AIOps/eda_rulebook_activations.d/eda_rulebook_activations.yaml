---
eda_rulebook_activations:
  - name: Intelligent-Remediation
    description: >-
      Routes known events (disk, service, CPU, certificate) to specific AAP job templates
      and unknown events to AI-powered remediation workflow
    rulebook: intelligent-remediation.yml
    project: AIOps-Rulebooks
    decision_environment: AIOps-Decision-Environment
    credential: AAP-Controller-Token
    enabled: true
    restart_policy: on-failure
    log_level: info
