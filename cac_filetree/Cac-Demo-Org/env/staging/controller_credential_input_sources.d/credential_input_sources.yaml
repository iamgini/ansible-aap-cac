---
# Controller Credential Input Sources - STAGING ENVIRONMENT
# External secret management integration samples
# WARNING: Requires external vault credentials to be configured first
controller_credential_input_sources:
  # CyberArk integration for SSH credentials
  - credential_name: SSH-Admin-Credential
    input_field_name: password
    source_credential: CyberArk-Vault
    metadata:
      object_query: "Safe=IT-Admin-Secrets;Object=ssh-admin-password"
      object_query_format: "Exact"
    target_credential:
      organization: Cac-Demo-Org
      credential_type: Machine
      name: SSH-Admin-Credential

  # HashiCorp Vault integration for API tokens
  - credential_name: API-Token-Credential
    input_field_name: password
    source_credential: HashiCorp-Vault
    metadata:
      secret_path: "secret/data/automation/api_tokens"
      secret_key: "api_token"
      secret_backend: "kv"
      auth_path: "approle"
    target_credential:
      organization: Cac-Demo-Org
      credential_type: "Ansible Galaxy/Automation Hub API Token"
      name: API-Token-Credential

  # AWS Secrets Manager for database credentials
  - credential_name: Database-Admin-Credential
    input_field_name: password
    source_credential: AWS-Secrets-Manager
    metadata:
      secret_name: "prod/database/admin"
      secret_key: "password"
    target_credential:
      organization: Cac-Demo-Org
      credential_type: Machine
      name: Database-Admin-Credential

  # Azure Key Vault integration
  - credential_name: Azure-Service-Principal
    input_field_name: client_secret
    source_credential: Azure-Key-Vault
    metadata:
      secret_name: "azure-sp-client-secret"
    target_credential:
      organization: Cac-Demo-Org
      credential_type: "Microsoft Azure Resource Manager"
      name: Azure-Service-Principal
...
