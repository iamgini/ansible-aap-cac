    description: Demo application deployment collections (STAGING)
    resources: "https://github.com/demo/app-collections"
    groups:
      - name: App_Development_Team
        object_permissions:
          - upload_to_namespace

  - name: demo_network
    company: Demo Network Team
    email: demo-network@example.com
    description: Demo network automation collections (STAGING)
    groups:
      - name: Network_Team
        object_permissions:
          - upload_to_namespace
          - change_namespace
