# These are sample configurations for testing hub namespace management
hub_namespaces:
  - name: demo_infra
    company: Demo Infrastructure Team
    email: demo-infra@example.com
    description: Demo infrastructure automation collections (STAGING)
    resources: "https://github.com/demo/infra-collections"
    groups:
      - name: Infrastructure_Team
        object_permissions:
          - upload_to_namespace
          - change_namespace

  - name: demo_apps
    company: Demo Application Team
