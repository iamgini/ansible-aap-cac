---
# Custom Credential Type Example: REST API Integration
# Use Case: Calling external REST APIs with authentication tokens
# Demonstrates: API token + custom fields + extra_vars injection

controller_credential_types:
  - name: REST API Integration Credential
    description: Credential type for REST API integrations with token authentication
    kind: cloud
    inputs:
      fields:
        # API Authentication
        - id: api_token
          label: API Token / Bearer Token
          type: string
          secret: true
          help_text: API authentication token (kept secure)

        - id: api_key
          label: API Key (if separate from token)
          type: string
          secret: true
          help_text: Some APIs use both API key and token

        # API Endpoint Configuration
        - id: api_base_url
          label: API Base URL
          type: string
          help_text: "Base URL for API endpoints (e.g., https://api.example.com/v1)"

        - id: api_timeout
          label: API Timeout (seconds)
          type: string
          default: "30"
          help_text: Request timeout in seconds

        - id: verify_ssl
          label: Verify SSL Certificates
          type: boolean
          default: true
          help_text: Set to false only for testing with self-signed certs

        # Optional Headers
        - id: custom_header_name
          label: Custom Header Name (optional)
          type: string
          help_text: "Custom HTTP header name (e.g., X-Custom-Auth)"

        - id: custom_header_value
          label: Custom Header Value (optional)
          type: string
          secret: true
          help_text: Value for the custom header

        # Rate Limiting
        - id: rate_limit_requests
          label: Max Requests per Minute
          type: string
          default: "60"
          help_text: Rate limiting for API calls

      required:
        - api_token
        - api_base_url

    injectors:
      # Environment variables (accessible via lookup('env', 'VAR_NAME'))
      env:
        API_TOKEN: "{% raw %}{{ api_token }}{% endraw %}"
        API_KEY: "{% raw %}{{ api_key }}{% endraw %}"
        API_BASE_URL: "{% raw %}{{ api_base_url }}{% endraw %}"
        API_TIMEOUT: "{% raw %}{{ api_timeout }}{% endraw %}"
        API_VERIFY_SSL: "{% raw %}{{ verify_ssl }}{% endraw %}"
        API_CUSTOM_HEADER_NAME: "{% raw %}{{ custom_header_name }}{% endraw %}"
        API_CUSTOM_HEADER_VALUE: "{% raw %}{{ custom_header_value }}{% endraw %}"
        API_RATE_LIMIT: "{% raw %}{{ rate_limit_requests }}{% endraw %}"

      # Extra vars (accessible directly as Ansible variables)
      extra_vars:
        api_config:
          base_url: "{% raw %}{{ api_base_url }}{% endraw %}"
          timeout: "{% raw %}{{ api_timeout | int }}{% endraw %}"
          verify_ssl: "{% raw %}{{ verify_ssl }}{% endraw %}"
          rate_limit: "{% raw %}{{ rate_limit_requests | int }}{% endraw %}"

        api_auth:
          token: "{% raw %}{{ api_token }}{% endraw %}"
          key: "{% raw %}{{ api_key }}{% endraw %}"

  - name: ServiceNow API Credential
    description: Credential type for ServiceNow REST API integration
    kind: cloud
    inputs:
      fields:
        - id: snow_instance
          label: ServiceNow Instance
          type: string
          help_text: "ServiceNow instance name (e.g., dev12345)"

        - id: snow_username
          label: ServiceNow Username
          type: string

        - id: snow_password
          label: ServiceNow Password
          type: string
          secret: true

        - id: snow_client_id
          label: OAuth Client ID (optional)
          type: string

        - id: snow_client_secret
          label: OAuth Client Secret (optional)
          type: string
          secret: true

      required:
        - snow_instance
        - snow_username
        - snow_password

    injectors:
      env:
        SNOW_INSTANCE: "{% raw %}{{ snow_instance }}{% endraw %}"
        SNOW_USERNAME: "{% raw %}{{ snow_username }}{% endraw %}"
        SNOW_PASSWORD: "{% raw %}{{ snow_password }}{% endraw %}"
        SNOW_URL: "{% raw %}https://{{ snow_instance }}.service-now.com{% endraw %}"
        SNOW_CLIENT_ID: "{% raw %}{{ snow_client_id }}{% endraw %}"
        SNOW_CLIENT_SECRET: "{% raw %}{{ snow_client_secret }}{% endraw %}"

      extra_vars:
        servicenow:
          instance: "{% raw %}{{ snow_instance }}{% endraw %}"
          url: "{% raw %}https://{{ snow_instance }}.service-now.com{% endraw %}"
          username: "{% raw %}{{ snow_username }}{% endraw %}"

# Usage Examples:
#
# Example 1: Using environment variables
#
#   - name: Call REST API with token
#     uri:
#       url: "{{ lookup('env', 'API_BASE_URL') }}/users"
#       headers:
#         Authorization: "Bearer {{ lookup('env', 'API_TOKEN') }}"
#       method: GET
#       timeout: "{{ lookup('env', 'API_TIMEOUT') | int }}"
#       validate_certs: "{{ lookup('env', 'API_VERIFY_SSL') | bool }}"
#
# Example 2: Using extra_vars (cleaner)
#
#   - name: Call REST API with injected vars
#     uri:
#       url: "{{ api_config.base_url }}/users"
#       headers:
#         Authorization: "Bearer {{ api_auth.token }}"
#       method: GET
#       timeout: "{{ api_config.timeout }}"
#       validate_certs: "{{ api_config.verify_ssl }}"
#
# Example 3: ServiceNow API call
#
#   - name: Create ServiceNow incident
#     uri:
#       url: "{{ servicenow.url }}/api/now/table/incident"
#       method: POST
#       user: "{{ servicenow.username }}"
#       password: "{{ lookup('env', 'SNOW_PASSWORD') }}"
#       force_basic_auth: yes
#       body_format: json
#       body:
#         short_description: "Issue detected by Ansible"
#         urgency: 2
#
# Benefits:
# - Centralizes API credentials
# - Supports both environment variables and extra_vars
# - Token/password encryption in AAP
# - Easy credential rotation
# - Demonstrates both patterns (env vs extra_vars)
