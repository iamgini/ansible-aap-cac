---
# Custom Credential Type Example: Multi-Field Database Credential
# Use Case: Applications that need to access multiple database instances
# with different credentials (primary, secondary, backup clusters)

controller_credential_types:
  - name: Database Multi-Cluster Credential
    description: Credential type for applications accessing multiple database clusters
    kind: cloud
    inputs:
      fields:
        # Primary Database Cluster
        - id: primary_db_host
          label: Primary DB Hostname
          type: string
        - id: primary_db_port
          label: Primary DB Port
          type: string
          default: "5432"
        - id: primary_db_username
          label: Primary DB Username
          type: string
        - id: primary_db_password
          label: Primary DB Password
          type: string
          secret: true
        - id: primary_db_name
          label: Primary Database Name
          type: string

        # Secondary Database Cluster
        - id: secondary_db_host
          label: Secondary DB Hostname
          type: string
        - id: secondary_db_port
          label: Secondary DB Port
          type: string
          default: "5432"
        - id: secondary_db_username
          label: Secondary DB Username
          type: string
        - id: secondary_db_password
          label: Secondary DB Password
          type: string
          secret: true
        - id: secondary_db_name
          label: Secondary Database Name
          type: string

        # Backup Database Cluster
        - id: backup_db_host
          label: Backup DB Hostname
          type: string
        - id: backup_db_port
          label: Backup DB Port
          type: string
          default: "5432"
        - id: backup_db_username
          label: Backup DB Username
          type: string
        - id: backup_db_password
          label: Backup DB Password
          type: string
          secret: true
        - id: backup_db_name
          label: Backup Database Name
          type: string

      required:
        - primary_db_host
        - primary_db_username
        - primary_db_password
        - primary_db_name
        - secondary_db_host
        - secondary_db_username
        - secondary_db_password
        - secondary_db_name
        - backup_db_host
        - backup_db_username
        - backup_db_password
        - backup_db_name

    injectors:
      env:
        # Primary DB credentials
        PRIMARY_DB_HOST: "{% raw %}{{ primary_db_host }}{% endraw %}"
        PRIMARY_DB_PORT: "{% raw %}{{ primary_db_port }}{% endraw %}"
        PRIMARY_DB_USERNAME: "{% raw %}{{ primary_db_username }}{% endraw %}"
        PRIMARY_DB_PASSWORD: "{% raw %}{{ primary_db_password }}{% endraw %}"
        PRIMARY_DB_NAME: "{% raw %}{{ primary_db_name }}{% endraw %}"

        # Secondary DB credentials
        SECONDARY_DB_HOST: "{% raw %}{{ secondary_db_host }}{% endraw %}"
        SECONDARY_DB_PORT: "{% raw %}{{ secondary_db_port }}{% endraw %}"
        SECONDARY_DB_USERNAME: "{% raw %}{{ secondary_db_username }}{% endraw %}"
        SECONDARY_DB_PASSWORD: "{% raw %}{{ secondary_db_password }}{% endraw %}"
        SECONDARY_DB_NAME: "{% raw %}{{ secondary_db_name }}{% endraw %}"

        # Backup DB credentials
        BACKUP_DB_HOST: "{% raw %}{{ backup_db_host }}{% endraw %}"
        BACKUP_DB_PORT: "{% raw %}{{ backup_db_port }}{% endraw %}"
        BACKUP_DB_USERNAME: "{% raw %}{{ backup_db_username }}{% endraw %}"
        BACKUP_DB_PASSWORD: "{% raw %}{{ backup_db_password }}{% endraw %}"
        BACKUP_DB_NAME: "{% raw %}{{ backup_db_name }}{% endraw %}"

# Usage Example:
# 1. Create this credential type in AAP
# 2. Create a credential of this type with actual values
# 3. Attach to job template
# 4. In your playbook, access via environment variables:
#
#    - name: Connect to primary database
#      postgresql_query:
#        db: "{{ lookup('env', 'PRIMARY_DB_NAME') }}"
#        login_host: "{{ lookup('env', 'PRIMARY_DB_HOST') }}"
#        login_user: "{{ lookup('env', 'PRIMARY_DB_USERNAME') }}"
#        login_password: "{{ lookup('env', 'PRIMARY_DB_PASSWORD') }}"
#        port: "{{ lookup('env', 'PRIMARY_DB_PORT') }}"
#        query: SELECT version()
#
# Benefits:
# - Single credential manages multiple database clusters
# - Passwords are encrypted in AAP
# - Easy to rotate credentials in one place
# - Injected as environment variables (secure)
