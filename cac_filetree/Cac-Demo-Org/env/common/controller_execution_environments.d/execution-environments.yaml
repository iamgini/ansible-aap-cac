# ==============================================================
# Pull Policy Options
# ==============================================================
#
# pull: missing (default)
#   - Pull image if not present locally
#   - Use cached image if available
#   - Best for: Stable, versioned images
#
# pull: always
#   - Always pull image before job execution
#   - Ensures latest version
#   - Best for: :latest tags, active development
#
# pull: never
#   - Never pull, must exist locally
#   - Fails if image not cached
#   - Best for: Air-gapped environments, pre-loaded images
#
# ==============================================================
# Assigning EEs to Job Templates
# ==============================================================
#
# Method 1: In job template definition
# controller_templates:
#   - name: Network-Config-Backup
#     execution_environment: "Custom EE - Network Automation"
#     # ... other config ...
#
# Method 2: Organization default (applies to all templates)
# controller_organizations:
#   - name: Cac-Demo-Org
#     default_environment: "Supported EE - Red Hat"
#
# Method 3: Allow override at launch
# controller_templates:
#   - name: Flexible-Job
#     execution_environment: "Default EE - Minimal"
#     ask_execution_environment_on_launch: true
#     # User can select different EE when launching
#
# ==============================================================
# Building Custom Execution Environments
# ==============================================================
#
# Use ansible-builder to create custom EEs:
#
# 1. Create execution-environment.yml:
#    ---
#    version: 3
#    images:
#      base_image:
#        name: quay.io/ansible/ansible-runner:latest
#    dependencies:
#      galaxy: requirements.yml
#      python: requirements.txt
#      system: bindep.txt
#
# 2. Create requirements.yml (collections):
#    collections:
#      - name: cisco.ios
#      - name: ansible.netcommon
#
# 3. Create requirements.txt (Python packages):
#    netmiko>=4.0
#    paramiko>=2.7
#
# 4. Create bindep.txt (system packages):
#    python38-devel [platform:centos-8 platform:rhel-8]
#    openssh-clients [platform:rpm]
#
# 5. Build the EE:
#    ansible-builder build -t quay.io/myorg/custom-ee:v1.0
#
# 6. Push to registry:
#    podman push quay.io/myorg/custom-ee:v1.0
#
# 7. Add to AAP (this file)
#
# ==============================================================
# Container Registry Credential Setup
# ==============================================================
#
# Required for private registries or authenticated pulls:
#
# controller_credentials:
#   - name: Harbor-Registry-Credential
#     credential_type: Container Registry
#     organization: Cac-Demo-Org
#     inputs:
#       host: "harbor.company.com"
#       username: "robot$automation"
#       password: !vault |
#         $ANSIBLE_VAULT;1.1;AES256
#         ...vaulted token...
#       verify_ssl: true
#
# Then reference in EE definition:
#   credential: Harbor-Registry-Credential
#
# ==============================================================
# Troubleshooting EE Issues
# ==============================================================
#
# 1. Image pull failures:
#    - Check registry credential is correct
#    - Verify network connectivity to registry
#    - Check image name/tag exists
#    - Review pull policy setting
#
# 2. Job fails with "command not found":
#    - Missing system package in EE
#    - Rebuild EE with required package in bindep.txt
#
# 3. Collection not found:
#    - Collection not in EE
#    - Add to requirements.yml and rebuild
#
# 4. Python import errors:
#    - Python library missing
#    - Add to requirements.txt and rebuild
#
# 5. Check EE contents:
#    podman run -it <ee-image> /bin/bash
#    ansible-galaxy collection list
#    pip list
#
# ==============================================================
