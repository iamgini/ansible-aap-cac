---
# Execution Environments (EE) for Ansible Automation Platform
# EEs are container images that provide the runtime for playbook execution
# Include: Ansible core, collections, Python libraries, system packages

controller_execution_environments:
  # ==============================================================
  # Default Execution Environments
  # ==============================================================

  - name: Default EE - Minimal
    description: "Minimal execution environment with Ansible core only"
    organization: Cac-Demo-Org
    image: "quay.io/ansible/awx-ee:latest"
    pull: missing  # missing | always | never

  - name: Supported EE - Red Hat
    description: "Red Hat supported execution environment"
    organization: Cac-Demo-Org
    image: "registry.redhat.io/ansible-automation-platform-24/ee-supported-rhel8:latest"
    pull: missing
    # credential: RedHat-Registry-Credential  # Required for registry.redhat.io

  - name: Minimal EE - Red Hat
    description: "Minimal Red Hat execution environment"
    organization: Cac-Demo-Org
    image: "registry.redhat.io/ansible-automation-platform-24/ee-minimal-rhel8:latest"
    pull: missing
    # credential: RedHat-Registry-Credential

  # ==============================================================
  # Custom Execution Environments
  # ==============================================================

  - name: Custom EE - Network Automation
    description: "Custom EE for network device automation (Cisco, Juniper, Arista)"
    organization: Cac-Demo-Org
    image: "quay.io/myorg/network-automation-ee:v2.0"
    pull: always  # Always pull latest for custom builds
    # credential: Quay-Registry-Credential
    # Includes collections:
    # - cisco.ios
    # - cisco.nxos
    # - junipernetworks.junos
    # - arista.eos
    # - ansible.netcommon
    # - community.network

  - name: Custom EE - Cloud Automation
    description: "EE with cloud provider SDKs (AWS, Azure, GCP)"
    organization: Cac-Demo-Org
    image: "quay.io/myorg/cloud-automation-ee:v1.5"
    pull: missing
    # credential: Quay-Registry-Credential
    # Includes:
    # - amazon.aws
    # - azure.azcollection
    # - google.cloud
    # - Python: boto3, azure-mgmt, google-cloud
    # - CLI: aws-cli, az-cli, gcloud

  - name: Custom EE - Security Automation
    description: "EE for security tools and vulnerability scanning"
    organization: Cac-Demo-Org
    image: "quay.io/myorg/security-ee:v1.2"
    pull: missing
    # Includes:
    # - ansible.posix
    # - community.crypto
    # - Python: nmap, paramiko, cryptography
    # - Tools: openssl, nmap, nikto

  - name: Custom EE - Database Management
    description: "EE with database client libraries"
    organization: Cac-Demo-Org
    image: "quay.io/myorg/database-ee:v1.0"
    pull: missing
    # Includes:
    # - community.postgresql
    # - community.mysql
    # - community.mongodb
    # - Python: psycopg2, pymysql, pymongo, cx_Oracle

  - name: Custom EE - Windows Automation
    description: "EE optimized for Windows automation"
    organization: Cac-Demo-Org
    image: "quay.io/myorg/windows-ee:v2.1"
    pull: missing
    # Includes:
    # - ansible.windows
    # - community.windows
    # - chocolatey.chocolatey
    # - Python: pywinrm, requests-kerberos

  # ==============================================================
  # Private Registry Execution Environments
  # ==============================================================

  - name: Private Registry - Enterprise EE
    description: "Enterprise custom EE from private Harbor registry"
    organization: Cac-Demo-Org
    image: "harbor.company.com/automation/enterprise-ee:v3.0"
    pull: always
    credential: Harbor-Registry-Credential  # Container Registry credential
    # Note: Credential must be type "Container Registry" with:
    # - Authentication URL: harbor.company.com
    # - Username: robot$account or service account
    # - Password/Token: vaulted registry token

  - name: Private Registry - Custom Build
    description: "Custom built EE with specific requirements"
    organization: Cac-Demo-Org
    image: "nexus.company.com:5000/ansible/custom-ee:latest"
    pull: missing
    credential: Nexus-Registry-Credential

  # ==============================================================
  # Example: Organization Default EE
  # ==============================================================
  # Set default EE at organization level (not via this file):
  #
  # controller_organizations:
  #   - name: Cac-Demo-Org
  #     default_environment: "Supported EE - Red Hat"
  #
  # This makes it the default for all job templates in the org
  # unless overridden at the job template level
  # ==============================================================

