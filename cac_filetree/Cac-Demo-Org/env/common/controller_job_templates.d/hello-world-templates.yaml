---
# Hello World Demo Job Templates
# Using ansible-real-life/ansible-hello-world/hello-world.yaml playbook
# These templates demonstrate various scheduling scenarios

controller_templates:
  - name: "HW-01-Daily-Morning-Check"
    description: "Daily morning health check - Hello World demo"
    job_type: run
    inventory: Cac-Demo-Inventory
    project: Ansible-Real-Life-Cac
    playbook: ansible-hello-world/hello-world.yaml
    verbosity: 0
    extra_vars:
      your_name: "Morning Team"
    ask_inventory_on_launch: false
    ask_variables_on_launch: true
    ask_limit_on_launch: false

