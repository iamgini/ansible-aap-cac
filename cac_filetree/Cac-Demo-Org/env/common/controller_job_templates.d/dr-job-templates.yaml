controller_templates:
- name: DR-01-App-Stop-VM
  description: Stop application services on Virtual Machines - Primary Site
  job_type: run
  inventory: Cac-Demo-Inventory
  project: Ansible-Real-Life-Cac
  playbook: ansible-hello-world/hello-world.yaml
  verbosity: 0
  extra_vars:
    your_name: DR Application Stop VM
    dr_phase: app_shutdown
    dr_target: vm
  ask_variables_on_launch: true
  labels:
  - DR
  - critical
  - production
- name: DR-02-App-Stop-OCP
  description: Stop application services on OpenShift - Primary Site
  job_type: run
