  verbosity: 0
  extra_vars:
    your_name: DR Application Stop OCP
    dr_phase: app_shutdown
    dr_target: openshift
  ask_variables_on_launch: true
  labels:
  - DR
  - critical
  - production
- name: DR-03-MQ-Stop
