# ==============================================================
# Usage: Attaching Notifications to Job Templates
# ==============================================================
#
# In your job template configuration, add:
#
# controller_templates:
#   - name: My-Job-Template
#     # ... other config ...
#     notification_templates_started:
#       - Slack-Operations-Channel
#     notification_templates_success:
#       - Slack-Operations-Channel
#       - Email-Operations-Team
#     notification_templates_error:
#       - Slack-Critical-Alerts
#       - Email-Operations-Team
#       - PagerDuty-Production-Incidents
#       - Webhook-ServiceNow-Integration
#
# ==============================================================
# Available Jinja2 Variables in Notifications
# ==============================================================
#
# Job Variables:
# - {{ job.id }} - Job ID
# - {{ job.name }} - Job template name
# - {{ job_friendly_name }} - Display name
# - {{ job.status }} - Current status
# - {{ job.created_by }} - Username who started
# - {{ job.started }} - Start timestamp
# - {{ job.finished }} - Completion timestamp
# - {{ job.elapsed }} - Duration in seconds
# - {{ job.inventory }} - Inventory name
# - {{ job.limit }} - Host limit
# - {{ job.url }} - Direct URL to job
# - {{ job.result_traceback }} - Error details
#
# Workflow Variables:
# - {{ workflow_job.name }}
# - {{ workflow_job.id }}
# - {{ workflow_approval.name }}
# - {{ workflow_approval.timeout }}
# - {{ workflow_approval.url }}
#
# ==============================================================
# Security Notes
# ==============================================================
#
# 1. Always vault sensitive tokens/passwords
# 2. Use service accounts with minimal permissions
# 3. Regularly rotate integration tokens
# 4. Test notifications in dev before production
# 5. Set appropriate message retention policies
# 6. Monitor notification delivery failures
#
# ==============================================================
