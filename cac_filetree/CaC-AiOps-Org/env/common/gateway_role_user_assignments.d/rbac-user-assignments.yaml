---
# Gateway RBAC - User Role Assignments
# Assigns roles to individual users for organizations, teams, and resources
# AAP 2.5+ uses Platform Gateway for centralized RBAC management

gateway_role_user_assignments:
  # ============================================================
  # Organization-Level Roles
  # ============================================================

  # Organization Admin - Full control over organization and all its resources
  - role_definition: "Organization Admin"
    user: gineesh
    object_id: Cac-Demo-Org

  # Organization Member - Basic access to organization
  - role_definition: "Organization Member"
    user: jsmith
    object_id: Cac-Demo-Org

  - role_definition: "Organization Member"
    user: jdoe
    object_id: Cac-Demo-Org

  # ============================================================
  # Team-Level Roles
  # ============================================================

  # Team Admin - Can manage team members and permissions
  - role_definition: "Team Admin"
    user: jsmith
    object_id: cac-team-101

  # Team Member - Basic team membership
  - role_definition: "Team Member"
    user: jdoe
    object_id: cac-team-101

  - role_definition: "Team Member"
    user: jsmith
    object_id: cac-team-102

  # ============================================================
  # Resource-Specific Roles (Organization-scoped)
  # ============================================================

  # Inventory Admin - Can manage specific inventories
  - role_definition: "Organization Inventory Admin"
    user: jsmith
    object_id: Cac-Demo-Org

  # Project Admin - Can manage projects
  - role_definition: "Organization Project Admin"
    user: jsmith
    object_id: Cac-Demo-Org

  # Job Template Admin - Can create and manage job templates
  - role_definition: "Organization JobTemplate Admin"
    user: jsmith
    object_id: Cac-Demo-Org

  # Credential Admin - Can manage credentials
  - role_definition: "Organization Credential Admin"
    user: gineesh
    object_id: Cac-Demo-Org

  # ============================================================
  # Read-Only / Auditor Roles
  # ============================================================

  # Organization Auditor - Read-only access to organization
  - role_definition: "Organization Auditor"
    user: jdoe
    object_id: Cac-Demo-Org

  # ============================================================
  # Platform-Level Roles (no object_id - applies globally)
  # ============================================================

  # Platform Auditor - Read-only access across entire platform
  # - role_definition: "Platform Auditor"
  #   user: security-auditor

  # Platform Admin - Full platform administration (use with caution)
  # - role_definition: "Platform Admin"
  #   user: platform-admin

# ============================================================
# Available Role Definitions (AAP 2.5+)
# ============================================================
#
# ORGANIZATION-LEVEL ROLES:
# - Organization Admin              - Full control over organization
# - Organization Member              - Basic organization access
# - Organization Auditor             - Read-only organization access
# - Organization Project Admin       - Manage projects in organization
# - Organization Inventory Admin     - Manage inventories in organization
# - Organization Credential Admin    - Manage credentials in organization
# - Organization JobTemplate Admin   - Manage job templates in organization
# - Organization Workflow Admin      - Manage workflows in organization
# - Organization Execution Environment Admin - Manage EEs in organization
# - Organization Notification Admin  - Manage notifications in organization
#
# TEAM-LEVEL ROLES:
# - Team Admin                       - Manage team and its members
# - Team Member                      - Basic team membership
#
# PLATFORM-LEVEL ROLES (no object scoping):
# - Platform Admin                   - Full platform administration
# - Platform Auditor                 - Read-only platform access
#
# RESOURCE-SPECIFIC ROLES (object_id = specific resource):
# - Project Use                      - Can use project in job templates
# - Project Admin                    - Full control over specific project
# - Inventory Use                    - Can use inventory in jobs
# - Inventory Admin                  - Full control over specific inventory
# - JobTemplate Execute              - Can launch specific job template
# - JobTemplate Admin                - Full control over specific job template
# - Credential Use                   - Can use credential in jobs
# - Credential Admin                 - Full control over specific credential
#
# ============================================================
# Notes:
# ============================================================
# 1. Use 'object_id' for name-based lookup (recommended)
#    OR 'object_ansible_id' for UUID-based lookup
# 2. Multiple assignments can be given to same user
# 3. Role assignments are additive (permissions accumulate)
# 4. State 'absent' removes the assignment
# 5. Gateway roles (AAP 2.5+) replace controller roles (AAP 2.4)
# 6. Organization-scoped roles provide access to all resources
#    within that organization of that type
# 7. For specific resource access, use resource-specific roles
#    with object_id pointing to the resource
