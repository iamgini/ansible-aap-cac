---
# EDA Decision Environments Configuration
# Decision environments contain ansible-rulebook and required Python packages

eda_decision_environments:
  - name: AIOps-Decision-Environment
    description: Decision environment for AIOps rulebooks with ansible.eda collection
    image_url: "quay.io/ansible/ansible-rulebook:latest"
    # Or use custom image if you need specific collections/dependencies
    # image_url: "quay.io/your-org/aiops-decision-environment:v1.0"
    # credential: Container-Registry-Credential  # If using private registry

  # Note: Default decision environment should work for most cases
  # Custom decision environment only needed if:
  # - Using custom Python packages
  # - Using custom Ansible collections
  # - Specific version requirements
  #
  # To build custom decision environment:
  # 1. Create execution-environment.yml with dependencies
  # 2. Build with ansible-builder
  # 3. Push to container registry
  # 4. Reference here

# Default decision environment includes:
# - ansible-rulebook
# - ansible.eda collection
# - Common event source plugins (webhook, kafka, etc.)
