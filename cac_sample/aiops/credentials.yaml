---
# AIOps Credentials Configuration
# IMPORTANT: Use ansible-vault to encrypt sensitive values!

controller_credentials:
  - name: AIOps-Integration
    description: MCP and Git credentials for AI intelligence workflow
    organization: Default
    credential_type: AIOps Integration Credential
    inputs:
      mcp_server_url: "http://localhost:3000/mcp"  # Update with your MCP server URL or leave empty
      aap_bearer_token: !vault |
        $ANSIBLE_VAULT;1.1;AES256
        # Run: ansible-vault encrypt_string 'your_aap_token' --name 'aap_bearer_token'
        # Replace this placeholder with actual vaulted value
      git_token: !vault |
        $ANSIBLE_VAULT;1.1;AES256
        # Run: ansible-vault encrypt_string 'ghp_your_token' --name 'git_token'
        # Replace this placeholder with actual vaulted value
      git_username: "iamgini"  # Update with your GitHub username
      git_email: "net.gini@gmail.com"  # Update with your email
      git_remote_url: "https://github.com/iamgini/ansible-ai-generated-playbooks"  # Update with your repo

  - name: AIOps-Machine-Credential
    description: SSH credential for target hosts
    organization: Default
    credential_type: Machine
    inputs:
      username: ansible  # Update with your SSH username
      password: !vault |
        $ANSIBLE_VAULT;1.1;AES256
        # Run: ansible-vault encrypt_string 'your_password' --name 'password'
        # Or use SSH key instead
      # ssh_key_data: !vault |
      #   $ANSIBLE_VAULT;1.1;AES256
      #   # Your encrypted SSH private key
      become_method: sudo
      become_username: root

# Example: Vault encrypted values
# To create encrypted values:
# ansible-vault encrypt_string 'your_secret_here' --name 'variable_name'

# NOTE: For production, store credentials in AAP vault or external secret manager
# This file is for reference - actual secrets should not be committed to git
