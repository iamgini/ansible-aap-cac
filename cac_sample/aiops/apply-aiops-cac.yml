---
# Master playbook to apply all AIOps Configuration as Code
# This configures AAP Controller and EDA for Intelligent Remediation

- name: Configure AAP for AIOps Intelligent Remediation
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    # Load all CaC configuration files in order
    - credential_types.yaml
    - credentials.yaml
    - controller_projects.yaml
    - controller_inventories.yaml
    - controller_templates.yaml
    # - eda_rulebook_activations.yaml  # Apply separately with EDA playbook

  vars:
    # AAP Controller connection (override via environment or command line)
    controller_hostname: "{{ lookup('env', 'CONTROLLER_HOST') | default('https://controller.example.com', true) }}"
    controller_username: "{{ lookup('env', 'CONTROLLER_USERNAME') | default('admin', true) }}"
    controller_password: "{{ lookup('env', 'CONTROLLER_PASSWORD') }}"
    controller_validate_certs: "{{ lookup('env', 'CONTROLLER_VERIFY_SSL') | default('false', true) | bool }}"

  tasks:
    - name: Display configuration summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "AIOps CaC Configuration"
          - "=========================================="
          - "Controller: {{ controller_hostname }}"
          - "Organization: {{ controller_projects[0].organization }}"
          - "Projects: {{ controller_projects | length }}"
          - "Inventories: {{ controller_inventories | length }}"
          - "Job Templates: {{ controller_templates | length }}"
          - "Credential Types: {{ controller_credential_types | length }}"
          - "Credentials: {{ controller_credentials | length }}"
          - "=========================================="

    - name: Create custom credential types
      include_role:
        name: infra.controller_configuration.credential_types
      when: controller_credential_types is defined

    - name: Create credentials
      include_role:
        name: infra.controller_configuration.credentials
      when: controller_credentials is defined

    - name: Create/update projects
      include_role:
        name: infra.controller_configuration.projects
      when: controller_projects is defined

    - name: Create inventories
      include_role:
        name: infra.controller_configuration.inventories
      when: controller_inventories is defined

    - name: Create inventory hosts
      include_role:
        name: infra.controller_configuration.hosts
      when: controller_hosts is defined

    - name: Create job templates
      include_role:
        name: infra.controller_configuration.job_templates
      when: controller_templates is defined

    - name: Configuration summary
      ansible.builtin.debug:
        msg:
          - "=========================================="
          - "✅ AIOps CaC Applied Successfully!"
          - "=========================================="
          - "Created/Updated:"
          - "  - {{ controller_projects | length }} Projects"
          - "  - {{ controller_inventories | length }} Inventories"
          - "  - {{ controller_templates | length }} Job Templates"
          - "  - {{ controller_credential_types | length }} Credential Types"
          - "  - {{ controller_credentials | length }} Credentials"
          - "=========================================="
          - "Next Steps:"
          - "1. Verify job templates in AAP UI"
          - "2. Test each template manually"
          - "3. Apply EDA configuration (if using EDA)"
          - "4. Send test events to webhook"
          - "=========================================="

# Usage:
#
# # Set environment variables
# export CONTROLLER_HOST="https://controller.example.com"
# export CONTROLLER_USERNAME="admin"
# export CONTROLLER_PASSWORD="password"
# export CONTROLLER_VERIFY_SSL="false"
#
# # Apply configuration
# ansible-playbook apply-aiops-cac.yml
#
# # Or with inline variables
# ansible-playbook apply-aiops-cac.yml \
#   -e controller_hostname=https://controller.example.com \
#   -e controller_username=admin \
#   -e controller_password=password
#
# # With vault for credentials
# ansible-playbook apply-aiops-cac.yml --ask-vault-pass
